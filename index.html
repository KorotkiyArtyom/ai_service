<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Космический Интерфейс</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(15, 12, 41, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(138, 43, 226, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(138, 43, 226, 0.1);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.4);
        }

        .chat-item.active {
            background: rgba(138, 43, 226, 0.3);
            border-color: #8a2be2;
        }

        .chat-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6a0dad, #8a2be2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-date {
            font-size: 12px;
            color: #b19cd9;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: radial-gradient(circle at 30% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
        }

        .header {
            margin-bottom: 30px;
        }

        .model-selector {
            background: rgba(15, 12, 41, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            min-width: 250px;
        }

        .model-selector option {
            background: #0f0c29;
            color: white;
        }

        .chat-container {
            flex: 1;
            background: rgba(15, 12, 41, 0.4);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(138, 43, 226, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
            min-height: 0;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #9370db, #8a2be2);
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #6a0dad, #9370db);
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            border-bottom-right-radius: 5px;
        }

        .message.ai .message-content {
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            background: rgba(15, 12, 41, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.4);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #b19cd9;
        }

        .send-btn {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 12, 41, 0.4);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(138, 43, 226, 0.6);
        }

        /* Stars animation */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <button class="new-chat-btn" onclick="createNewChat()">
                <i class="fas fa-plus"></i>
                Новый чат
            </button>
            
            <div class="chat-list" id="chatList">
                <div class="chat-item active">
                    <div class="chat-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="chat-info">
                        <div class="chat-title">Космический помощник</div>
                        <div class="chat-date">Сегодня</div>
                    </div>
                </div>
                
                <div class="chat-item">
                    <div class="chat-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="chat-info">
                        <div class="chat-title">Анализ данных</div>
                        <div class="chat-date">Вчера</div>
                    </div>
                </div>
                
                <div class="chat-item">
                    <div class="chat-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <div class="chat-info">
                        <div class="chat-title">Помощь с кодом</div>
                        <div class="chat-date">2 дня назад</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <select class="model-selector" id="modelSelector">
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="claude-3">Claude 3</option>
                    <option value="llama-3">Llama 3</option>
                    <option value="mistral">Mistral</option>
                </select>
            </div>

            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message ai">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            Привет! Я ваш космический ИИ-помощник. Чем могу помочь вам сегодня?
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="Введите ваш запрос..."
                            rows="1"
                            onkeypress="handleKeyPress(event)"
                        ></textarea>
                    </div>
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create stars background
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Simulate AI response (replace with actual API call)
            setTimeout(() => {
                const aiResponse = "Это демонстрационный ответ. В реальной версии здесь будет ответ от ИИ модели.";
                addMessage(aiResponse, 'ai');
            }, 1000);
        }

        // Add message to chat
        function addMessage(text, type) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const avatarIcon = type === 'user' ? 'fa-user' : 'fa-robot';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas ${avatarIcon}"></i>
                </div>
                <div class="message-content">
                    ${text}
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Create new chat
        function createNewChat() {
            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = `
                <div class="message ai">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        Привет! Я ваш космический ИИ-помощник. Чем могу помочь вам сегодня?
                    </div>
                </div>
            `;
        }

        // Initialize
        createStars();
    </script>
</body>
</html>
